services:
  # ── Backend ──────────────────────────────────────────────────
  - type: web
    name: munsoc                      # → deploys to munsoc.onrender.com
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://munsoc.onrender.com/api/v1/auth/callback
      - key: FRONTEND_URL
        value: https://munportal-frontend.onrender.com
      - key: UPI_ID
        sync: false
      - key: UPI_NAME
        sync: false

  # ── Frontend ──────────────────────────────────────────────────
  - type: web
    name: munportal-frontend           # → deploys to munportal-frontend.onrender.com
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://munsoc.onrender.com   # backend URL, no trailing slash
    routes:
      - type: rewrite
        source: /*
        destination: /index.html