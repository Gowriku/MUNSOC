version: "3.9"

services:
  db:
    image: postgres:15
    container_name: munportal_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: munportal_backend
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: munportal_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    # NOTE: No volume mount for frontend on Windows — files are baked into
    # the image at build time via COPY . . in the Dockerfile.
    # This avoids the Windows/WSL2 volume sync issue entirely.
    # To apply frontend changes: docker-compose up --build frontend

volumes:
  pgdata: